<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Responsive</title>
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <h2 class="question--title">Q7 サイズ変更</h2>
  <div class="red--box"></div>
  <h2 class="question--title">Q2 色変更</h2>
  <div class="color--box"></div>
  <h2 class="question--title">Q3 margin値の変更</h2>
  <div class="margin--box">
    <div class="blue--box"></div>
    <div class="green--box"></div>
  </div>
  <h2 class="question--title">Q4 floatの解除</h2>
  <div class="float--box">
    <div class="float--red--box"></div>
    <div class="float--blue--box"></div>
  </div>
  <h2 class="question--title">Q5 flexboxの入れ替え(逆順)</h2>
  <div class="reverse--box">
    <p class="red--reverse--box">A</p>
    <p class="blue--reverse--box">B</p>
    <p class="orange--reverse--box">C</p>
  </div>
  <h2 class="question--title">Q6 flexboxの入れ替え(指定)</h2>
  <div class="designation--box">
    <p class="lightgreen--box">A</p>
    <p class="yellow--box">B</p>
    <p class="pink--box">C</p>
  </div>
  <h2 class="question--title">Q7 要素の表示・非表示</h2>
  <div class="show--hide--box">
    <div class="show--hide--red--box"></div>
    <div class="show--hide--blue--box"></div>
    <div class="show--hide--green--box"></div>
  </div>
</body>

</html>
